<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLB Props Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f172a; --card: #1e293b; --border: #334155;
    --accent: #3b82f6; --text: #f1f5f9; --muted: #94a3b8;
    --green: #22c55e; --red: #ef4444; --yellow: #eab308; --gray: #64748b;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; font-size: 14px; }
  a { color: var(--accent); }
  /* Layout */
  .container { max-width: 1280px; margin: 0 auto; padding: 16px; }
  /* Header */
  .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0 24px; flex-wrap: wrap; gap: 8px; }
  .header h1 { font-size: 22px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
  .header-meta { font-size: 12px; color: var(--muted); text-align: right; }
  /* Cards row */
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; }
  .card-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 6px; }
  .card-value { font-size: 26px; font-weight: 700; }
  .card-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .pos { color: var(--green); } .neg { color: var(--red); }
  /* Section */
  .section { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 24px; }
  .section-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: var(--text); }
  /* Table */
  .tbl-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 10px; color: var(--muted); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  th.sortable { cursor: pointer; user-select: none; }
  th.sortable:hover { color: var(--text); }
  th.sort-asc::after  { content: ' ↑'; color: var(--accent); }
  th.sort-desc::after { content: ' ↓'; color: var(--accent); }
  td { padding: 9px 10px; border-bottom: 1px solid #1e293b; vertical-align: middle; white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  /* Badges */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 600; }
  .badge-HIGH  { background: rgba(34,197,94,0.15);  color: var(--green); }
  .badge-MEDIUM{ background: rgba(234,179,8,0.15);  color: var(--yellow); }
  .badge-LOW   { background: rgba(100,116,139,0.15); color: var(--gray); }
  .outcome-WIN  { color: var(--green); font-weight: 700; }
  .outcome-LOSS { color: var(--red);   font-weight: 700; }
  .outcome-PUSH { color: var(--gray);  font-weight: 600; }
  /* Chart */
  .chart-wrap { position: relative; height: 260px; }
  /* Accordion */
  .accordion-item { border-bottom: 1px solid var(--border); }
  .accordion-item:last-child { border-bottom: none; }
  .accordion-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; cursor: pointer; user-select: none; }
  .accordion-header:hover { color: var(--accent); }
  .accordion-chevron { transition: transform 0.2s; font-size: 16px; color: var(--muted); }
  .accordion-body { display: none; padding-bottom: 12px; }
  .accordion-body.open { display: block; }
  .accordion-chevron.open { transform: rotate(90deg); }
  /* Schedule timeline */
  .schedule-timeline { display: flex; align-items: flex-start; gap: 0; overflow-x: auto; padding-bottom: 4px; }
  .sched-step { display: flex; flex-direction: column; align-items: center; flex: 1; min-width: 80px; position: relative; }
  .sched-step:not(:last-child)::after {
    content: ''; position: absolute; top: 14px; left: calc(50% + 14px);
    right: calc(-50% + 14px); height: 2px; background: var(--border); z-index: 0;
  }
  .sched-step.done::after    { background: var(--green); }
  .sched-step.running::after { background: var(--yellow); }
  .sched-dot {
    width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border);
    background: var(--bg); display: flex; align-items: center; justify-content: center;
    font-size: 12px; z-index: 1; position: relative;
  }
  .sched-step.done    .sched-dot { background: var(--green);  border-color: var(--green);  color: #fff; }
  .sched-step.running .sched-dot { background: var(--yellow); border-color: var(--yellow); color: #000; animation: pulse 1.2s infinite; }
  .sched-step.next    .sched-dot { border-color: var(--accent); color: var(--accent); }
  .sched-step.upcoming .sched-dot { border-color: var(--border); color: var(--muted); }
  .sched-label { font-size: 10px; color: var(--muted); margin-top: 6px; text-align: center; line-height: 1.3; }
  .sched-time  { font-size: 11px; font-weight: 600; margin-top: 2px; text-align: center; }
  .sched-step.done    .sched-time { color: var(--green); }
  .sched-step.running .sched-time { color: var(--yellow); }
  .sched-step.next    .sched-time { color: var(--accent); }
  .sched-step.upcoming .sched-time { color: var(--muted); }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(234,179,8,0.5); } 50% { box-shadow: 0 0 0 6px rgba(234,179,8,0); } }
  .sched-progress { display: flex; gap: 16px; margin-top: 14px; font-size: 12px; color: var(--muted); }
  /* Responsive */
  @media (max-width: 640px) {
    .card-value { font-size: 20px; }
  }
  .empty { color: var(--muted); padding: 24px; text-align: center; font-size: 13px; }
  .spinner { text-align: center; padding: 24px; color: var(--muted); }
  /* Live-update flash */
  @keyframes flash-update { 0%,100% { background: transparent; } 30% { background: rgba(59,130,246,0.18); } }
  .flash-update { animation: flash-update 0.9s ease; }
  /* Breakdown section */
  .breakdown-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 900px) { .breakdown-grid { grid-template-columns: 1fr; } }
  .breakdown-sub { font-size: 12px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.7px; color: var(--muted); margin-bottom: 10px; }
  .bkd-roi-pos { color: var(--green); font-weight: 700; }
  .bkd-roi-neg { color: var(--red);   font-weight: 700; }
  .bkd-roi-neu { color: var(--muted); font-weight: 700; }
  .bkd-winpct-hi { color: var(--green); }
  .bkd-totals td { border-top: 1px solid var(--border) !important;
    font-weight: 600; color: var(--text); }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <h1>⚾ MLB Props Dashboard</h1>
    <div class="header-meta">
      <div id="current-date"></div>
      <div>Last refresh: <span id="last-refresh">—</span> <span id="poll-mode" style="color:var(--green);font-size:11px"></span></div>
    </div>
  </div>

  <!-- Summary cards -->
  <div class="cards" id="summary-cards">
    <div class="card"><div class="card-label">Total Bets</div><div class="card-value" id="s-total">—</div><div class="card-sub" id="s-pending">loading…</div></div>
    <div class="card"><div class="card-label">Record (W-L-P)</div><div class="card-value" id="s-record">—</div><div class="card-sub" id="s-hitrate">—</div></div>
    <div class="card"><div class="card-label">Total P/L</div><div class="card-value" id="s-pl">—</div><div class="card-sub" id="s-roi">—</div></div>
    <div class="card"><div class="card-label">Streak</div><div class="card-value" id="s-streak">—</div><div class="card-sub" id="s-last7">—</div></div>
  </div>

  <!-- Model Schedule -->
  <div class="section">
    <div class="section-title">Model Schedule</div>
    <div id="schedule-wrap"><div class="spinner">Loading…</div></div>
  </div>

  <!-- Today's picks -->
  <div class="section">
    <div class="section-title">Today's Picks</div>
    <div class="tbl-wrap" id="today-wrap"><div class="spinner">Loading…</div></div>
  </div>

  <!-- P/L Chart -->
  <div class="section">
    <div class="section-title">P/L — Last 30 Days</div>
    <div class="chart-wrap"><canvas id="pl-chart"></canvas></div>
  </div>

  <!-- Last 7 days accordion -->
  <div class="section">
    <div class="section-title">Last 7 Days</div>
    <div id="week-wrap"><div class="spinner">Loading…</div></div>
  </div>

  <!-- Performance Breakdown -->
  <div class="section">
    <div class="section-title">Performance Breakdown</div>
    <div id="breakdown-wrap"><div class="spinner">Loading…</div></div>
  </div>


</div><!-- /container -->

<script>
// ──────────────────────────────────────────────────────────────────────────
// Constants
// ──────────────────────────────────────────────────────────────────────────
const PROP_LABELS = {
  // Internal names
  hits: 'H', strikeouts: 'K', home_runs: 'HR',
  total_bases: 'TB', rbis: 'RBI', runs_scored: 'R',
  singles: '1B', doubles: '2B', hits_runs_rbis: 'H+R+RBI',
  // API market keys
  batter_hits: 'H', pitcher_strikeouts: 'K', batter_home_runs: 'HR',
  batter_total_bases: 'TB', batter_rbis: 'RBI', batter_runs_scored: 'R',
  batter_singles: '1B', batter_doubles: '2B', batter_hits_runs_rbis: 'H+R+RBI',
  batter_walks: 'BB', batter_strikeouts: 'SO',
  pitcher_hits_allowed: 'HA', pitcher_walks: 'BB', pitcher_earned_runs: 'ER', pitcher_outs: 'OUT',
};
const REFRESH_MS = 60_000;
let plChart = null;

// ──────────────────────────────────────────────────────────────────────────
// Utilities
// ──────────────────────────────────────────────────────────────────────────
const fmtProp = t => PROP_LABELS[t] || t;
const fmtOdds = n => n > 0 ? `+${n}` : `${n}`;
const fmtPl   = n => n == null ? '—' : (n >= 0 ? `+${n.toFixed(2)}` : n.toFixed(2));
const fmtPct  = n => n == null ? '—' : `${(n * 100).toFixed(1)}%`;
const fmtEdge = n => n == null ? '—' : `${(n * 100).toFixed(1)}%`;
// projection is now the model probability for the chosen side (as %)
// e.g. 73.0 for Under 1.5 hits means model says 73.0% chance this bet hits
function fmtProjection(propType, projection, pick) {
  if (projection == null) return '—';
  const pct = typeof projection === 'number' ? projection.toFixed(1) : projection;
  const dir = (pick || '').toLowerCase() === 'over' ? 'Over' : 'Under';
  return `${pct}% ${dir}`;
}

function plClass(n) {
  if (n == null) return '';
  return n > 0 ? 'pos' : n < 0 ? 'neg' : '';
}

// Convert "9:40 PM ET" → minutes since midnight for numeric sort
function gameTimeToMinutes(timeStr) {
  if (!timeStr) return 9999;
  const m = timeStr.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!m) return 9999;
  let h = parseInt(m[1], 10);
  const min = parseInt(m[2], 10);
  const ampm = m[3].toUpperCase();
  if (ampm === 'PM' && h !== 12) h += 12;
  if (ampm === 'AM' && h === 12) h = 0;
  return h * 60 + min;
}

// Generic column sort for a <table> by data-col index, toggling asc/desc
function sortTable(tableId, clickedTh) {
  const table = document.getElementById(tableId);
  if (!table) return;
  const col   = parseInt(clickedTh.dataset.col, 10);
  const type  = clickedTh.dataset.type || 'str';  // 'num' or 'str'
  const isAsc = !clickedTh.classList.contains('sort-asc');

  // Clear sort indicators on all ths in this table
  table.querySelectorAll('th').forEach(th => th.classList.remove('sort-asc', 'sort-desc'));
  clickedTh.classList.add(isAsc ? 'sort-asc' : 'sort-desc');

  const tbody = table.querySelector('tbody');
  const rows  = Array.from(tbody.querySelectorAll('tr'));
  rows.sort((a, b) => {
    const aCell = a.querySelectorAll('td')[col];
    const bCell = b.querySelectorAll('td')[col];
    const aVal  = aCell ? (aCell.dataset.sort ?? aCell.textContent.trim()) : '';
    const bVal  = bCell ? (bCell.dataset.sort ?? bCell.textContent.trim()) : '';
    let cmp;
    if (type === 'num') {
      cmp = parseFloat(aVal) - parseFloat(bVal);
    } else {
      cmp = aVal.localeCompare(bVal);
    }
    return isAsc ? cmp : -cmp;
  });
  rows.forEach(r => tbody.appendChild(r));
}

function badge(conf) {
  const c = (conf || '').toUpperCase();
  return `<span class="badge badge-${c}">${c}</span>`;
}

function outcomeCell(outcome, pl) {
  if (!outcome) return '<span style="color:var(--muted)">pending</span>';
  const cls = `outcome-${outcome}`;
  const plStr = pl != null ? ` (${fmtPl(pl)}u)` : '';
  return `<span class="${cls}">${outcome}${plStr}</span>`;
}

// ──────────────────────────────────────────────────────────────────────────
// Fetch helpers
// ──────────────────────────────────────────────────────────────────────────
async function fetchJSON(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status} from ${url}`);
  return res.json();
}

// ──────────────────────────────────────────────────────────────────────────
// Render: Summary cards
// ──────────────────────────────────────────────────────────────────────────
function renderSummary(d) {
  const pl = d.total_pl;
  document.getElementById('s-total').textContent   = d.total_bets;
  document.getElementById('s-pending').textContent = `Last 7d: ${fmtPl(d.last_7_pl)}u`;
  document.getElementById('s-record').textContent  = d.record;
  document.getElementById('s-hitrate').textContent = `Hit rate: ${fmtPct(d.hit_rate)}`;
  const plEl = document.getElementById('s-pl');
  plEl.textContent  = fmtPl(pl) + 'u';
  plEl.className    = 'card-value ' + plClass(pl);
  document.getElementById('s-roi').textContent = `ROI: ${d.roi_pct}%`;
  const streakEl = document.getElementById('s-streak');
  streakEl.textContent = d.streak || '—';
  streakEl.className   = 'card-value ' + (d.streak && d.streak.startsWith('+') ? 'pos' : d.streak && d.streak.startsWith('-') ? 'neg' : '');
  document.getElementById('s-last7').textContent = `Last 7d: ${fmtPl(d.last_7_pl)}u`;
}

// ──────────────────────────────────────────────────────────────────────────
// Render: Today's picks table
// ──────────────────────────────────────────────────────────────────────────
function renderToday(d) {
  const wrap = document.getElementById('today-wrap');
  if (!d.bets || d.bets.length === 0) {
    wrap.innerHTML = '<div class="empty">No picks today.</div>';
    return;
  }
  const rows = d.bets.map(b => {
    // When team is known: "Cardinals vs Dodgers". When only matchup: show "ARI @ LAD".
    let matchupHtml;
    if (b.team) {
      const vs = b.opponent ? ` <span style="color:var(--muted);font-size:11px">vs ${b.opponent}</span>` : '';
      matchupHtml = `<span style="font-weight:600;font-size:12px">${b.team}</span>${vs}`;
    } else if (b.opponent) {
      matchupHtml = `<span style="color:var(--muted);font-size:12px">${b.opponent}</span>`;
    } else {
      matchupHtml = '';
    }
    // Sort key for game_time: convert "9:40 PM ET" → minutes since midnight for numeric sort
    const timeSortKey = gameTimeToMinutes(b.game_time);
    const timeDisplay = b.game_time ? `<span style="color:var(--muted);font-size:11px">${b.game_time}</span>` : '—';
    return `
    <tr>
      <td>
        <div>${b.player_name}</div>
        <div style="margin-top:2px">${matchupHtml}</div>
      </td>
      <td data-sort="${timeSortKey}">${timeDisplay}</td>
      <td>${fmtProp(b.prop_type)}</td>
      <td>${b.pick.toUpperCase()} ${b.line}</td>
      <td style="color:var(--muted);font-size:12px">${fmtProjection(b.prop_type, b.model_projection, b.pick)}</td>
      <td>${fmtOdds(b.odds)}</td>
      <td>${fmtEdge(b.edge)}</td>
      <td>${badge(b.confidence)}</td>
      <td>${b.units}u</td>
      <td data-sort="${(b.book || '').toLowerCase()}">${b.book}</td>
      <td>${b.is_live ? '<span class="pos">LIVE</span>' : '<span style="color:var(--muted)">paper</span>'}</td>
      <td>${outcomeCell(b.outcome, b.pl_units)}</td>
      <td>${b.actual_stat != null ? b.actual_stat : '—'}</td>
    </tr>`;
  }).join('');
  wrap.innerHTML = `
    <div style="margin-bottom:10px;font-size:12px;color:var(--muted)">
      ${d.bets.length} picks · ${d.total_units}u total · ${d.live_count} live / ${d.paper_count} paper
    </div>
    <div class="tbl-wrap">
    <table id="today-table">
      <thead><tr>
        <th>Player / Team</th>
        <th class="sortable" data-col="1" data-type="num">Game Time</th>
        <th>Prop</th><th>Pick</th>
        <th>Projection</th><th>Odds</th><th>Edge</th><th>Conf</th><th>Units</th>
        <th class="sortable" data-col="9" data-type="str">Book</th>
        <th>Type</th><th>Result</th><th>Actual</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
  // Attach sort handlers after DOM is updated
  document.querySelectorAll('#today-table th.sortable').forEach(th => {
    th.addEventListener('click', () => sortTable('today-table', th));
  });
}

// ──────────────────────────────────────────────────────────────────────────
// Render: P/L Chart
// ──────────────────────────────────────────────────────────────────────────
function renderPL(d) {
  const labels   = d.series.map(s => s.date);
  const dailyPL  = d.series.map(s => s.daily_pl);
  const cumPL    = d.series.map(s => s.cumulative_pl);
  const ctx      = document.getElementById('pl-chart').getContext('2d');
  if (plChart) plChart.destroy();
  plChart = new Chart(ctx, {
    data: {
      labels,
      datasets: [
        {
          type: 'bar',
          label: 'Daily P/L (u)',
          data: dailyPL,
          backgroundColor: dailyPL.map(v => v >= 0 ? 'rgba(34,197,94,0.5)' : 'rgba(239,68,68,0.5)'),
          borderColor:     dailyPL.map(v => v >= 0 ? '#22c55e' : '#ef4444'),
          borderWidth: 1,
          yAxisID: 'yBar',
        },
        {
          type: 'line',
          label: 'Cumulative P/L (u)',
          data: cumPL,
          borderColor: '#3b82f6',
          backgroundColor: 'rgba(59,130,246,0.1)',
          pointRadius: 3,
          tension: 0.3,
          fill: true,
          yAxisID: 'yCum',
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#94a3b8', font: { size: 12 } } },
        tooltip: { backgroundColor: '#1e293b', titleColor: '#f1f5f9', bodyColor: '#94a3b8' },
      },
      scales: {
        x: { ticks: { color: '#64748b', maxRotation: 45 }, grid: { color: '#1e293b' } },
        yBar: { position: 'left',  ticks: { color: '#94a3b8' }, grid: { color: '#334155' } },
        yCum: { position: 'right', ticks: { color: '#3b82f6' }, grid: { drawOnChartArea: false } },
      },
    },
  });
}

// ──────────────────────────────────────────────────────────────────────────
// Render: Last 7 days accordion
// ──────────────────────────────────────────────────────────────────────────
function renderWeek(d) {
  const wrap = document.getElementById('week-wrap');
  if (!d.days || d.days.length === 0) {
    wrap.innerHTML = '<div class="empty">No data for last 7 days.</div>';
    return;
  }
  const items = d.days.map((day, i) => {
    const plStr  = fmtPl(day.daily_pl);
    const plCls  = plClass(day.daily_pl);
    const rows   = day.bets.map(b => `
      <tr>
        <td>${b.player_name}</td>
        <td>${fmtProp(b.prop_type)}</td>
        <td>${b.pick.toUpperCase()} ${b.line}</td>
        <td>${fmtOdds(b.odds)}</td>
        <td>${badge(b.confidence)}</td>
        <td>${b.units}u</td>
        <td>${outcomeCell(b.outcome, b.pl_units)}</td>
      </tr>`).join('');
    return `
      <div class="accordion-item">
        <div class="accordion-header" onclick="toggleAccordion(${i})">
          <span>${day.date} <span style="color:var(--muted);margin-left:8px">${day.bet_count} bet${day.bet_count !== 1 ? 's' : ''}</span></span>
          <span style="display:flex;align-items:center;gap:12px">
            <span class="${plCls}">${plStr}u</span>
            <span class="accordion-chevron" id="chev-${i}">›</span>
          </span>
        </div>
        <div class="accordion-body" id="body-${i}">
          <div class="tbl-wrap">
          <table>
            <thead><tr><th>Player</th><th>Prop</th><th>Pick</th><th>Odds</th><th>Conf</th><th>Units</th><th>Result</th></tr></thead>
            <tbody>${rows}</tbody>
          </table></div>
        </div>
      </div>`;
  }).join('');
  wrap.innerHTML = items;
}

function toggleAccordion(i) {
  const body = document.getElementById('body-' + i);
  const chev = document.getElementById('chev-' + i);
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

// ──────────────────────────────────────────────────────────────────────────
// Render: Model Schedule
// ──────────────────────────────────────────────────────────────────────────
const SCHED_ICONS = {
  morning:   '🌅',
  slot:      '⚾',
  results:   '📊',
  statcast:  '🔬',
  scheduler: '🗓',
  other:     '🔧',
};
const SCHED_STATUS_ICON = {
  done:     '✓',
  running:  '…',
  next:     '▶',
  upcoming: '○',
};

function renderSchedule(d) {
  const wrap = document.getElementById('schedule-wrap');
  if (!d.entries || d.entries.length === 0) {
    wrap.innerHTML = '<div class="empty">No schedule loaded — scheduler runs at 6 AM ET.</div>';
    return;
  }

  const steps = d.entries.map((e, i) => {
    const icon = SCHED_ICONS[e.role] || '🔧';
    const stIcon = SCHED_STATUS_ICON[e.status] || '○';
    const isLast = i === d.entries.length - 1;
    return `
      <div class="sched-step ${e.status}" title="${e.display} — ${e.time_et}">
        <div class="sched-dot">${stIcon}</div>
        <div class="sched-label">${icon} ${e.display}</div>
        <div class="sched-time">${e.time_et}</div>
      </div>`;
  }).join('');

  const nextEntry = d.entries.find(e => e.status === 'next');
  const nextStr   = nextEntry ? `Next: <strong style="color:var(--accent)">${nextEntry.display}</strong> at <strong style="color:var(--accent)">${nextEntry.time_et}</strong>` : '<span style="color:var(--green)">All runs complete for today</span>';

  wrap.innerHTML = `
    <div class="schedule-timeline">${steps}</div>
    <div class="sched-progress">
      <span>${d.done_count} / ${d.run_count} runs complete</span>
      <span>·</span>
      <span>${nextStr}</span>
      <span>·</span>
      <span style="color:var(--muted)">Current time: ${d.current_time}</span>
    </div>`;
}

// ──────────────────────────────────────────────────────────────────────────
// Render: Performance Breakdown
// ──────────────────────────────────────────────────────────────────────────
function roiClass(v) {
  if (v == null) return 'bkd-roi-neu';
  return v > 0 ? 'bkd-roi-pos' : v < 0 ? 'bkd-roi-neg' : 'bkd-roi-neu';
}
function winPctClass(v) { return (v != null && v >= 55) ? 'bkd-winpct-hi' : ''; }
function fmtRoi(v) { if (v == null) return '—'; return (v >= 0 ? '+' : '') + v.toFixed(1) + '%'; }
function fmtPl2(v) { if (v == null) return '—'; return (v >= 0 ? '+' : '') + v.toFixed(2) + 'u'; }

// Snapshot of last-rendered totals for change detection
let _prevBkdTotals = null;

function renderBreakdown(d) {
  const wrap = document.getElementById('breakdown-wrap');
  if (!d || (!d.by_prop_type.length && !d.by_edge.length)) {
    wrap.innerHTML = '<div class="empty">No resolved bets yet.</div>';
    return;
  }

  const t = d.totals;
  const totRecord = t ? `${t.wins}-${t.losses}` : '—';

  // Detect if totals changed since last render so we can flash the rows
  const totalsKey = t ? `${t.bets}|${t.pl_units}|${t.roi_pct}` : '';
  const totalsChanged = _prevBkdTotals !== null && _prevBkdTotals !== totalsKey;
  _prevBkdTotals = totalsKey;
  const totalsCls = totalsChanged ? 'bkd-totals flash-update' : 'bkd-totals';

  // ── Table 1: By Bet Type ──────────────────────────────────────────────
  const propRows = (d.by_prop_type || []).map(r => {
    const record = `${r.wins}-${r.losses}${r.pushes ? '-' + r.pushes : ''}`;
    return `<tr>
      <td style="font-weight:600">${r.prop_label}</td>
      <td style="text-align:right">${r.bets}</td>
      <td style="text-align:right">${record}</td>
      <td style="text-align:right" class="${winPctClass(r.win_pct)}">${r.win_pct != null ? r.win_pct + '%' : '—'}</td>
      <td style="text-align:right" class="${roiClass(r.roi_pct)}">${fmtRoi(r.roi_pct)}</td>
      <td style="text-align:right" class="${r.pl_units >= 0 ? 'pos' : 'neg'}">${fmtPl2(r.pl_units)}</td>
      <td style="text-align:right;color:var(--muted)">${r.avg_edge_pct != null ? r.avg_edge_pct + '%' : '—'}</td>
    </tr>`;
  }).join('');

  const propTotal = t ? `<tr class="${totalsCls}">
    <td>Total</td>
    <td style="text-align:right">${t.bets}</td>
    <td style="text-align:right">${totRecord}</td>
    <td style="text-align:right" class="${winPctClass(t.win_pct)}">${t.win_pct != null ? t.win_pct + '%' : '—'}</td>
    <td style="text-align:right" class="${roiClass(t.roi_pct)}">${fmtRoi(t.roi_pct)}</td>
    <td style="text-align:right" class="${t.pl_units >= 0 ? 'pos' : 'neg'}">${fmtPl2(t.pl_units)}</td>
    <td></td>
  </tr>` : '';

  const propTable = `
    <div class="breakdown-sub">By Bet Type</div>
    <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th>Type</th>
        <th style="text-align:right">Bets</th>
        <th style="text-align:right">W-L</th>
        <th style="text-align:right">Win%</th>
        <th style="text-align:right">ROI</th>
        <th style="text-align:right">P/L</th>
        <th style="text-align:right">Avg Edge</th>
      </tr></thead>
      <tbody>${propRows}${propTotal}</tbody>
    </table></div>`;

  // ── Table 2: By Odds Band ─────────────────────────────────────────────
  const oddsRows = (d.by_odds || []).map(r => {
    const record = `${r.wins}-${r.losses}`;
    const avgOddsStr = r.avg_odds != null ? fmtOdds(r.avg_odds) : '—';
    return `<tr>
      <td style="font-weight:600">${r.odds_band}</td>
      <td style="text-align:right">${r.bets}</td>
      <td style="text-align:right">${record}</td>
      <td style="text-align:right" class="${winPctClass(r.win_pct)}">${r.win_pct != null ? r.win_pct + '%' : '—'}</td>
      <td style="text-align:right" class="${roiClass(r.roi_pct)}">${fmtRoi(r.roi_pct)}</td>
      <td style="text-align:right" class="${r.pl_units >= 0 ? 'pos' : 'neg'}">${fmtPl2(r.pl_units)}</td>
      <td style="text-align:right;color:var(--muted)">${avgOddsStr}</td>
    </tr>`;
  }).join('');

  const oddsTotal = t ? `<tr class="${totalsCls}">
    <td>Total</td>
    <td style="text-align:right">${t.bets}</td>
    <td style="text-align:right">${totRecord}</td>
    <td style="text-align:right" class="${winPctClass(t.win_pct)}">${t.win_pct != null ? t.win_pct + '%' : '—'}</td>
    <td style="text-align:right" class="${roiClass(t.roi_pct)}">${fmtRoi(t.roi_pct)}</td>
    <td style="text-align:right" class="${t.pl_units >= 0 ? 'pos' : 'neg'}">${fmtPl2(t.pl_units)}</td>
    <td></td>
  </tr>` : '';

  const oddsTable = `
    <div class="breakdown-sub">By Odds</div>
    <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th>Odds Band</th>
        <th style="text-align:right">Bets</th>
        <th style="text-align:right">W-L</th>
        <th style="text-align:right">Win%</th>
        <th style="text-align:right">ROI</th>
        <th style="text-align:right">P/L</th>
        <th style="text-align:right">Avg Odds</th>
      </tr></thead>
      <tbody>${oddsRows}${oddsTotal}</tbody>
    </table></div>`;

  // ── Table 3: By Edge Bucket ────────────────────────────────────────────
  const edgeRows = (d.by_edge || []).map(r => {
    const record = `${r.wins}-${r.losses}`;
    const mktPct  = r.avg_mkt_prob_pct  != null ? r.avg_mkt_prob_pct  + '%' : '—';
    const modPct  = r.avg_model_prob_pct != null ? r.avg_model_prob_pct + '%' : '—';
    return `<tr>
      <td style="font-weight:600">${r.edge_bucket}</td>
      <td style="text-align:right">${r.bets}</td>
      <td style="text-align:right">${record}</td>
      <td style="text-align:right" class="${winPctClass(r.win_pct)}">${r.win_pct != null ? r.win_pct + '%' : '—'}</td>
      <td style="text-align:right" class="${roiClass(r.roi_pct)}">${fmtRoi(r.roi_pct)}</td>
      <td style="text-align:right" class="${r.pl_units >= 0 ? 'pos' : 'neg'}">${fmtPl2(r.pl_units)}</td>
      <td style="text-align:right;color:var(--muted)">${mktPct}</td>
      <td style="text-align:right;color:var(--accent)">${modPct}</td>
    </tr>`;
  }).join('');

  const edgeTotal = t ? `<tr class="${totalsCls}">
    <td>Total</td>
    <td style="text-align:right">${t.bets}</td>
    <td style="text-align:right">${totRecord}</td>
    <td style="text-align:right" class="${winPctClass(t.win_pct)}">${t.win_pct != null ? t.win_pct + '%' : '—'}</td>
    <td style="text-align:right" class="${roiClass(t.roi_pct)}">${fmtRoi(t.roi_pct)}</td>
    <td style="text-align:right" class="${t.pl_units >= 0 ? 'pos' : 'neg'}">${fmtPl2(t.pl_units)}</td>
    <td></td><td></td>
  </tr>` : '';

  const edgeTable = `
    <div class="breakdown-sub">By Model Edge vs Market</div>
    <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th>Edge Band</th>
        <th style="text-align:right">Bets</th>
        <th style="text-align:right">W-L</th>
        <th style="text-align:right">Win%</th>
        <th style="text-align:right">ROI</th>
        <th style="text-align:right">P/L</th>
        <th style="text-align:right">Mkt%</th>
        <th style="text-align:right">Model%</th>
      </tr></thead>
      <tbody>${edgeRows}${edgeTotal}</tbody>
    </table></div>`;

  const asOf = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  wrap.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span></span>
      <span id="breakdown-as-of" style="font-size:11px;color:var(--muted)">as of ${asOf}</span>
    </div>
    <div class="breakdown-grid">
      <div>${propTable}</div>
      <div>${oddsTable}</div>
    </div>
    <div style="margin-top:20px">${edgeTable}</div>`;
}

// ──────────────────────────────────────────────────────────────────────────
// Adaptive refresh
//   • FAST (15 s) while any of today's bets are still pending outcome, or
//     while the resolved-bet count is growing between polls (results coming in)
//   • SLOW (60 s) once everything is settled
// ──────────────────────────────────────────────────────────────────────────
const REFRESH_FAST_MS = 15_000;
const REFRESH_SLOW_MS = 60_000;
let _refreshTimer = null;
let _prevResolvedCount = null;

function scheduleNextRefresh(pendingCount, resolvedCount) {
  clearTimeout(_refreshTimer);
  const countGrew = _prevResolvedCount !== null && resolvedCount > _prevResolvedCount;
  _prevResolvedCount = resolvedCount;
  const activeResults = pendingCount > 0 || countGrew;
  const delay = activeResults ? REFRESH_FAST_MS : REFRESH_SLOW_MS;
  _refreshTimer = setTimeout(loadAll, delay);
  // Show poll cadence in header when in fast mode
  const meta = document.getElementById('poll-mode');
  if (meta) meta.textContent = activeResults ? '· live (15s)' : '';
}

async function loadAll() {
  let pendingCount = 0;
  let resolvedCount = 0;
  try {
    const [summary, today, pl, sched, breakdown] = await Promise.all([
      fetchJSON('/api/summary'),
      fetchJSON('/api/today'),
      fetchJSON('/api/pl'),
      fetchJSON('/api/schedule'),
      fetchJSON('/api/breakdown'),
    ]);
    renderSummary(summary);
    renderSchedule(sched);
    renderToday(today);
    renderPL(pl);
    renderBreakdown(breakdown);

    // Count pending bets from today to drive adaptive polling
    pendingCount  = (today.bets || []).filter(b => !b.outcome).length;
    resolvedCount = summary.total_bets || 0;
  } catch (err) {
    console.error('Dashboard refresh error:', err);
  }
  // Week is less critical — fetch separately, don't block adaptive scheduling
  fetchJSON('/api/week').then(renderWeek).catch(err => console.error('Week error:', err));

  document.getElementById('last-refresh').textContent = new Date().toLocaleTimeString();
  scheduleNextRefresh(pendingCount, resolvedCount);
}

// Header clock
function updateClock() {
  document.getElementById('current-date').textContent =
    new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'short', day: 'numeric' });
}

updateClock();
setInterval(updateClock, 60_000);
loadAll();
</script>
